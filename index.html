<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Protected · Fabulous CRM</title>
<style>
  :root{--ground:#F6F8FB;--surf:#FFFFFF;--ink:#1A2230;--mut:#5B6675;--faint:#8A94A3;--hair:#E2E6EC;--accent:#2A6FD6;--accent-deep:#1B4F9E;--lost:#D6453E;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--ground);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:var(--surf);border:1px solid var(--hair);border-radius:16px;padding:34px 32px 30px;max-width:390px;width:100%;box-shadow:0 6px 28px rgba(26,34,48,.07);}
  .eyebrow{font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600;margin:0 0 10px;}
  h1{font-size:21px;font-weight:660;letter-spacing:-.01em;margin:0 0 8px;}
  p.sub{font-size:13.5px;color:var(--mut);margin:0 0 22px;line-height:1.5;}
  label{display:block;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);font-weight:600;margin:0 0 8px;}
  .row{display:flex;gap:9px;}
  input{flex:1;font-size:15px;padding:11px 13px;border:1px solid var(--hair);border-radius:10px;background:var(--ground);color:var(--ink);font-family:inherit;}
  input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:transparent;}
  button{font-size:14px;font-weight:600;padding:11px 18px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer;font-family:inherit;transition:background .12s;}
  button:hover{background:var(--accent-deep);}
  button:disabled{opacity:.6;cursor:default;}
  .err{font-size:13px;color:var(--lost);margin:14px 0 0;min-height:18px;font-weight:500;}
  .foot{font-size:11.5px;color:var(--faint);margin:20px 0 0;line-height:1.5;}
</style>
</head>
